services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - LLM_PROVIDER=github
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - REDIS_URL=redis://redis:6379
      - POSTGRES_TIER1_URL=postgresql://relioadmin:localdev@postgres:5432/relio_tier1_private
      - POSTGRES_TIER3_URL=postgresql://relioadmin:localdev@postgres:5432/relio_tier3_shared
      - AUTO_MIGRATE=true
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: relioadmin
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: relio_tier1_private
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relioadmin -d relio_tier1_private"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
