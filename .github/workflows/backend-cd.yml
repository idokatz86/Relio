name: Backend CD

on:
  push:
    branches: [main]
    paths: ['backend/**']

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: relioacr
  RESOURCE_GROUP: relio-rg

jobs:
  build-and-deploy:
    name: Build → ACR → Container Apps
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and Push to ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image relio-backend:${{ github.sha }} \
            --image relio-backend:latest \
            --file backend/Dockerfile \
            backend/

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name relio-backend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/relio-backend:${{ github.sha }}

      - name: Smoke Test
        run: |
          sleep 30
          HEALTH_URL=$(az containerapp show \
            --name relio-backend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${HEALTH_URL}/health")
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed: HTTP $STATUS"
