name: Relio Backend CI

on:
  pull_request:
    paths:
      - 'backend/**'
    branches:
      - main
      - development
      - staging
  push:
    paths:
      - 'backend/**'
    branches:
      - development

permissions:
  contents: read

jobs:
  typecheck-and-test:
    name: TypeScript Check + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Test summary
        if: always()
        run: echo "✅ TypeCheck + 11 tests (pipeline integration + canary leak detection)"
